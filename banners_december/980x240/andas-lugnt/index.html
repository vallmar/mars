<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <!-- Adform DHTML Library - loaded dynamically for Adform compliance -->
    <script>
        (function() {
            var src = window.API_URL || 'https://s1.adform.net/banners/scripts/rmb/Adform.DHTML.js?bv=' + Math.random();
            var script = document.createElement('script');
            script.src = src;
            script.onerror = function() { console.log('Adform library not loaded - using fallback click handling'); };
            document.head.appendChild(script);
        })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="ad.size" content="width=980,height=240">
    <title>Andas lugnt 980x240</title>
    <style>
        @font-face {
            font-family: 'Handelsbanken Sans';
            src: url('HandelsbankenSans-Regular.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
        }
        @font-face {
            font-family: 'Handelsbanken Sans';
            src: url('HandelsbankenSans-Bold.woff2') format('woff2');
            font-weight: bold;
            font-style: normal;
        }
        html {
            width: 980px;
            height: 240px;
            background: white;
            top: 0;
        }
              body {
            margin: 0;
            padding: 0;
            font-weight: bold;
            width: 980px;
            height: 240px;
            font-family: 'Handelsbanken Sans', sans-serif;
            background: #002f4d;
             color: #f6f5ee;        
            overflow: hidden;
            position: relative;
        }
        
        .copy {
            position: absolute;
            left: 21px;
            top: 35px;
            z-index: 2;
        }
        .copy p {
            font-size: 32px;
            line-height: 27px;
            margin: 0;
            margin-bottom: 8px;
            display: block;
            color: #3CADFF;
        }
         .copy p:first-of-type {
            color: #f6f5ee;
        }
                .subcopy {
letter-spacing: 0.02em;
            color: #f6f5ee;
            position: absolute;
            left: 24px;
            top: 120px;
            font-size: 16px;
            font-weight: normal;
        }
        .wordmark {
            position: absolute;
            left: 20px;
            bottom: 20px;
            width: 240px;
            right: auto;
            z-index: 2;
        }
        .top-image {
            position: absolute;
            right: 20px;
            top: 20px;
            width: 270px;
            object-fit: cover;
            z-index: 1;
            border-radius: 6px;
        }
        .banner {
            width: 980px;
            height: 240px;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }
            .pivot.line {
            opacity: 1;
        }
        .top-image.pivot {
            opacity: 0;
            transform: translate(0px, 26px);
            will-change: transform, opacity;
        }
        .top-image.pivot.is-y {
            opacity: 1;
            transform: translate(0px, 0px);
            transition: transform 900ms cubic-bezier(0.7, 0.0, 0.0, 1.0), opacity 900ms cubic-bezier(0.7, 0.0, 0.0, 1.0);
        }
        .top-image.pivot.is-full-opacity {
            opacity: 1 !important;
            transition: opacity 900ms cubic-bezier(0.7, 0.0, 0.0, 1.0);
        }
        .pivot {
            opacity: 0;
            transform: translate(56px, 0px);
            will-change: transform, opacity;
        }

        .pivot.headline {
            opacity: 0;
            transform: translate(0px, 36px);
            will-change: transform, opacity;
        }
        .pivot.is-y {
            opacity: 1;
            transform: translate(0px, 0px);
            transition: transform 900ms cubic-bezier(0.7, 0.0, 0.0, 1.0), opacity 900ms cubic-bezier(0.7, 0.0, 0.0, 1.0);
        }

        .pivot.is-x {
            transform: translate(0px, 0px);
            opacity: 1;

            transition: transform 600ms cubic-bezier(0.7, 0.0, 0.0, 1.0);
        }
    </style>
</head>
<body>
    <div class="banner" id="banner">
        <img class="top-image" src="AndasLugnt-980x240-6px-runda-horn.jpg" alt="">
        <div class="copy headline pivot is-y">
            <p class="line pivot is-x" data-pivot-group="headline">Andas lugnt.</p>
            <p class="line pivot is-x" data-pivot-group="headline">Med trygg Private Banking nära dig.</p>
         
        </div>
        <div class="subcopy pivot is-x" data-pivot-group="subcopy">Välkommen att boka ett personligt samtal</div>
        <img class="wordmark" src="HB_Wordmark.svg" alt="Handelsbanken">
    </div>
        <script>
        // Adform-compliant clickTAG implementation
        (function () {
            'use strict';

            var banner = document.getElementById('banner');
            if (!banner) return;

            var defaultClickUrl = 'https://www.handelsbanken.se/sv/privat/spara/private-banking';

            function getClickUrl() {
                try {
                    if (window.dhtml && typeof dhtml.getVar === 'function') {
                        return dhtml.getVar('clickTAG', defaultClickUrl);
                    }
                } catch (e) {}

                if (typeof window.clickTAG === 'string' && window.clickTAG) return window.clickTAG;
                if (typeof window.clickTag === 'string' && window.clickTag) return window.clickTag;
                return defaultClickUrl;
            }

            function trackClick() {
                try {
                    if (window.adform && typeof window.adform.track === 'function') {
                        window.adform.track();
                    }
                } catch (e) {}

                window.open(getClickUrl(), '_blank');
            }

            banner.addEventListener('click', function () {
                trackClick();
            });
        })();
        
        (function () {

            function onReady(fn) {
                if (document.readyState === 'complete' || document.readyState === 'interactive') {
                    window.setTimeout(fn, 0);
                    return;
                }
                document.addEventListener('DOMContentLoaded', fn, { once: true });
            }

            var prefersReducedMotion = false;
            try {
                prefersReducedMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
            } catch (e) {
                prefersReducedMotion = false;
            }

            var Y_DURATION = 675;

            function setInitial(el) {
                el.classList.remove('is-y');
                el.classList.remove('is-x');
                // Keep base .pivot styles for initial state
            }

            function pivotIn(el, delayMs) {
                // console.log(delayMs);
                const yMovement = el.classList.contains('is-y');
                setInitial(el);
                // if (prefersReducedMotion) {
                //     el.style.opacity = '1';
                //     el.style.transform = 'translate(0px, 0px)';
                //     return;
                // }

                // Phase 1: Vertical move (Y) + fade in. X stays constant.
                window.setTimeout(function () {
                    if(yMovement) {
                        el.classList.add('is-y');
                        
                // console.log(yMovement);
                    }
                    else{

                        // Phase 2: Horizontal move (X only). Y stays at 0.
                        window.setTimeout(function () {
                            el.classList.add('is-x');
                        }, Y_DURATION);
                        
                    }
                }, delayMs);
            }

            function run() {
                var image = document.querySelector('.top-image');
                if (image) {
                    image.classList.add('pivot');
                    setTimeout(function() { image.classList.add('is-y'); }, 100);
                }
                var headlineLines = Array.prototype.slice.call(document.querySelectorAll('[data-pivot-group="headline"]'));
                var subcopy = document.querySelector('[data-pivot-group="subcopy"]');
                var copyContainer = document.querySelector('.headline.pivot');
                var wordmark = document.querySelector('.wordmark');
                
                if (copyContainer) pivotIn(copyContainer, 100);
                for (var i = 0; i < headlineLines.length; i++) {
                    pivotIn(headlineLines[i], (i * 40));
                }

                if (subcopy) {
                    pivotIn(subcopy, 80);
                }
            }
            onReady(function () {
                // Defer one frame so layout styles apply before we toggle classes.
                window.requestAnimationFrame(run);
            });
        })();
    </script>
</body>
</html>
